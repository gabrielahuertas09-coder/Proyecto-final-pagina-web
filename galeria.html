                <!-- SVG Técnico HUD Animado (Rediseño Estilo Referencia) -->
                <svg viewBox="0 0 500 500" class="wheel-hud-svg">
                    <!-- CAPA 1: Arcos Exteriores Fragmentados -->
                    <g class="hud-rotate-slow">
                        <path d="M 250 10 A 240 240 0 0 1 490 250" fill="none" class="hud-arc" stroke-width="0.5" stroke-dasharray="10, 20" />
                        <path d="M 10 250 A 240 240 0 0 1 250 490" fill="none" class="hud-arc" stroke-width="1.5" />
                        <circle cx="250" cy="250" r="245" class="hud-arc" stroke-width="0.5" stroke-opacity="0.2" />
                    </g>
                    
                    <!-- CAPA 2: Escalas y Ticks Milimétricos -->
                    <g class="hud-rotate-fast" transform="translate(250, 250)">
                        <g>
                            <!-- Ticks exteriores (360 grados) -->
                            <path d="M 220 0 L 230 0" class="hud-tick" transform="rotate(0)" />
                            <path d="M 220 0 L 230 0" class="hud-tick" transform="rotate(2)" />
                            <path d="M 220 0 L 230 0" class="hud-tick" transform="rotate(4)" />
                            <path d="M 220 0 L 230 0" class="hud-tick" transform="rotate(6)" />
                            <path d="M 220 0 L 230 0" class="hud-tick" transform="rotate(8)" />
                            <path d="M 220 0 L 230 0" class="hud-tick" transform="rotate(10)" />
                            <circle cx="0" cy="0" r="225" fill="none" class="hud-arc" stroke-width="1" stroke-dasharray="2, 8" />
                        </g>
                        <!-- Punteros Triangulares -->
                        <polygon points="230,-5 240,0 230,5" class="hud-accent" transform="rotate(45)" />
                        <polygon points="230,-5 240,0 230,5" class="hud-accent" transform="rotate(225)" />
                    </g>

                    <!-- CAPA 3: Arcos Gruesos y Datos Numéricos -->
                    <g class="hud-pulse">
                        <path d="M 460 250 A 210 210 0 0 1 250 460" fill="none" class="hud-arc hud-arc-thick" stroke-dasharray="80, 20" />
                        <path d="M 40 250 A 210 210 0 0 1 250 40" fill="none" class="hud-arc" stroke-width="4" stroke-dasharray="10, 150" />
                        
                        <!-- Etiquetas Numéricas (Siguiendo la referencia) -->
                        <g class="hud-data-group" transform="translate(250, 250)">
                            <text x="215" y="-10" class="hud-data-text" transform="rotate(-70)">8.396</text>
                            <text x="215" y="-10" class="hud-data-text" transform="rotate(-50)">8.368</text>
                            <text x="215" y="-10" class="hud-data-text" transform="rotate(-30)">8.324</text>
                            <text x="215" y="-10" class="hud-data-text" transform="rotate(-10)">8.288</text>
                            <text x="215" y="-10" class="hud-data-text" transform="rotate(10)">8.252</text>
                        </g>
                    </g>

                    <!-- NÚCLEO CENTRAL (HUD Core) -->
                    <g transform="translate(250, 250)">

    <!-- Script de Rotación e Interacción Lateral -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wheel = document.getElementById('radiantWheel');
            const previewImg = document.getElementById('photoPreviewImg');
            const placeholder = document.querySelector('.preview-placeholder');
            const radiantItems = document.querySelectorAll('.radiant-item');

            let rotation = 0;
            let targetRotation = 0;
            let currentRotation = 0;
            let targetX = 0; // Para el movimiento lateral solicitado
            let currentX = 0;

            // 1. Animación de Rotación y Movimiento Horizontal Dinámico
            function animate() {
                rotation += 0.04; // Rotación lenta constante
                currentRotation += (rotation + targetRotation - currentRotation) * 0.1;
                currentX += (targetX - currentX) * 0.05; // Suavizado del movimiento X

                // Aplicamos tanto la rotación como el desplazamiento lateral
                wheel.style.transform = `translate(${currentX}px, -50%) rotate(${currentRotation}deg)`;
                requestAnimationFrame(animate);
            }
            animate();

            // Interacción con el mouse para rotación y movimiento lateral
            window.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                targetRotation = (x - 0.5) * 12; // Rotación según el mouse
                targetX = (x - 0.5) * 40;        // Desplazamiento Izquierda-Derecha (40px rango)
            });

            // 2. Lógica de "Apertura" en el Panel Derecho (Visualizar imagen completa)
            radiantItems.forEach(item => {
                item.addEventListener('click', () => {
                    const img = item.querySelector('img');
                    
                    // Efecto de fundido al cambiar la imagen
                    previewImg.classList.remove('active');
                    
                    // Detectar si la foto es vertical
                    const isVertical = item.classList.contains('vertical-photo');
                    
                    setTimeout(() => {
                        previewImg.src = img.src;
                        
                        // Aplicar clase vertical si corresponde
                        if (isVertical) {
                            previewImg.classList.add('is-vertical');
                        } else {
                            previewImg.classList.remove('is-vertical');
                        }
                        
                        previewImg.classList.add('active');
                        placeholder.style.display = 'none';
                    }, 100);
                });
            });
        });
    </script>
