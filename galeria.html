    <main class="radiant-wrapper">
        <!-- SECCIÓN IZQUIERDA: La Rueda (HUD STYLE ANIMATED) -->
        <section class="wheel-section">
            <div class="radiant-hub">
                <!-- SVG Técnico HUD Animado -->
                <svg viewBox="0 0 500 500" class="wheel-hud-svg">
                    <!-- Capa Rotación Lenta (CW) -->
                    <g class="hud-rotate-slow">
                        <circle cx="250" cy="250" r="240" class="hud-arc" stroke-width="1" />
                        <circle cx="250" cy="250" r="210" class="hud-arc" stroke-width="8" stroke-dasharray="100, 400" />
                        <!-- Ticks -->
                        <g transform="translate(250, 250)">
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(0)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(45)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(90)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(135)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(180)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(225)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(270)" />
                            <line x1="215" y1="0" x2="225" y2="0" class="hud-tick" transform="rotate(315)" />
                        </g>
                    </g>
                    
                    <!-- Capa Rotación Rápida (CCW) -->
                    <g class="hud-rotate-fast">
                        <circle cx="250" cy="250" r="230" class="hud-arc hud-arc-dashed" stroke-width="1" />
                        <circle cx="250" cy="250" r="190" class="hud-arc" stroke-width="2" stroke-dasharray="200, 100" />
                    </g>

                    <!-- Capa Núcleo Central (Pulsating) -->
                    <g class="hud-pulse">
                        <circle cx="250" cy="250" r="130" class="hud-arc hud-arc-thick" />
                        <circle cx="250" cy="250" r="110" class="hud-arc" stroke-width="2" stroke-dasharray="20, 20" />
                        <!-- Círculo azul oscuro en el centro (NUEVO ORDEN: Azul -> Naranja -> Rojo) -->
                        <circle cx="250" cy="250" r="45" fill="#001219" opacity="1" />
                    </g>

                    <!-- Datos Numéricos Estáticos -->
                    <text x="250" y="40" class="hud-data-text" text-anchor="middle">SYSTEM.READY</text>
                    <text x="460" y="250" class="hud-data-text">8.324</text>

            <a href="index.html" class="back-link">← VOLVER AL INICIO</a>

    <!-- Script de Rotación e Interacción Lateral -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wheel = document.getElementById('radiantWheel');
            const previewImg = document.getElementById('photoPreviewImg');
            const placeholder = document.querySelector('.preview-placeholder');
            const radiantItems = document.querySelectorAll('.radiant-item');

            let rotation = 0;
            let targetRotation = 0;
            let currentRotation = 0;
            let targetX = 0; // Para el movimiento lateral solicitado
            let currentX = 0;

            // 1. Animación de Rotación y Movimiento Horizontal Dinámico
            function animate() {
                rotation += 0.04; // Rotación lenta constante
                currentRotation += (rotation + targetRotation - currentRotation) * 0.1;
                currentX += (targetX - currentX) * 0.05; // Suavizado del movimiento X

                // Aplicamos tanto la rotación como el desplazamiento lateral
                wheel.style.transform = `translate(${currentX}px, -50%) rotate(${currentRotation}deg)`;
                requestAnimationFrame(animate);
            }
            animate();

            // Interacción con el mouse para rotación y movimiento lateral
            window.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                targetRotation = (x - 0.5) * 12; // Rotación según el mouse
                targetX = (x - 0.5) * 40;        // Desplazamiento Izquierda-Derecha (40px rango)
            });

            // 2. Lógica de "Apertura" en el Panel Derecho (Visualizar imagen completa)
            radiantItems.forEach(item => {
                item.addEventListener('click', () => {
                    const img = item.querySelector('img');
                    
                    // Efecto de fundido al cambiar la imagen
                    previewImg.classList.remove('active');
                    
                    // Detectar si la foto es vertical
                    const isVertical = item.classList.contains('vertical-photo');
                    
                    setTimeout(() => {
                        previewImg.src = img.src;
                        
                        // Aplicar clase vertical si corresponde
                        if (isVertical) {
                            previewImg.classList.add('is-vertical');
                        } else {
                            previewImg.classList.remove('is-vertical');
                        }
                        
                        previewImg.classList.add('active');
                        placeholder.style.display = 'none';
                    }, 100);
                });
            });
        });
    </script>
